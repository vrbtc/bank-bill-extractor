name: Deploy Bank Bill Dashboard

on:
  schedule:
    # GitHub Actions cron 延迟严重（观察稳定在 3-5 小时），故提前 5 小时设置，
    # 让实际推送时间接近北京 11:00 和 17:00
    - cron: '0 20 * * *'  # UTC 20:00 = 前一天北京 04:00（实际约 09:00-11:00 推送）
    - cron: '0 2 * * *'   # UTC 02:00 = 北京 10:00（实际约 15:00-17:00 推送）
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  extract-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        env:
          # 多邮箱配置：JSON 字符串，每个邮箱可配置 label（如 YY）
          # 格式: [{"address":"...","password":"...","imap_server":"...","imap_port":993,"label":"YY"}]
          # 如果未配置 EMAILS_JSON，会回退到 EMAIL_ADDRESS/EMAIL_PASSWORD 单邮箱模式
          EMAILS_JSON: ${{ secrets.EMAILS_JSON }}
          # 单邮箱模式（向后兼容，EMAILS_JSON 未配置时使用）
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          TICKTICK_API_KEY: ${{ secrets.TICKTICK_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python generate_dashboard.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
